<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EduCore — Reset Database</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: Inter, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh
        }

        .card {
            background: #1e293b;
            border: 1px solid #2d3d57;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5)
        }

        h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 16px 0 8px
        }

        p {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 24px;
            line-height: 1.7
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin: 6px;
            transition: .2s
        }

        .btn-danger {
            background: #ef4444;
            color: #fff
        }

        .btn-danger:hover {
            background: #dc2626
        }

        .btn-ghost {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #2d3d57
        }

        .btn-ghost:hover {
            color: #e2e8f0
        }

        .warn {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .4);
            border-radius: 10px;
            padding: 14px;
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 20px
        }

        #done {
            display: none;
            background: rgba(34, 197, 94, .1);
            border: 1px solid #22c55e;
            border-radius: 10px;
            padding: 14px;
            color: #22c55e;
            font-size: 13px;
            margin-top: 16px
        }
    </style>
</head>

<body>
    <div class="card">
        <div style="font-size:48px">🗑️</div>
        <h1>Reset EduCore Database</h1>
        <p>This will permanently erase <strong>all data</strong> — institution, users, students, classes, attendance,
            fees, and marks.</p>
        <div class="warn">⚠️ This cannot be undone. All records will be lost.</div>
        <button class="btn btn-danger" onclick="wipe()">🗑️ Yes, Wipe Everything</button>
        <button class="btn btn-ghost" onclick="window.location.href='index.html'">Cancel</button>
        <div id="done">✅ Database wiped! Redirecting to fresh setup...</div>
    </div>
    <script>
        function wipe() {
            localStorage.removeItem('educore_data');
            sessionStorage.clear();
            document.getElementById('done').style.display = 'block';
            setTimeout(function () { window.location.href = 'index.html'; }, 2000);
        }
    </script>
</body>

</html>
