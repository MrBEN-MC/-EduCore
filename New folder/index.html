<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduCore — Tuition Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-logo">🎓</div>
      <h1 class="loading-title">EduCore</h1>
      <p class="loading-sub">Tuition Management System</p>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
  </div>

  <!-- Auth Container (login / register — no sidebar) -->
  <div id="auth-container" class="hidden">
    <div id="auth-content"></div>
  </div>

  <!-- Dashboard Container (with sidebar) -->
  <div id="dashboard-container" class="hidden">

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="logo-emoji">🎓</span>
          <div class="logo-text">
            <strong>EduCore</strong>
            <small id="inst-name-short">Institution</small>
          </div>
        </div>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar-display">U</div>
          <div class="user-details">
            <div class="user-name" id="user-name-display">User</div>
            <div class="user-role" id="user-role-display">Role</div>
          </div>
        </div>
        <button class="logout-btn" onclick="Auth.logout()" title="Logout">⇤</button>
      </div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="App.closeSidebar()"></div>

    <main id="main-area" class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" onclick="App.toggleSidebar()">☰</button>
          <div id="breadcrumb" class="breadcrumb">Dashboard</div>
        </div>
        <div class="topbar-right">
          <div class="search-wrap">
            <input type="text" id="global-search" class="search-input" placeholder="Search..." oninput="App.globalSearch(this.value)">
          </div>
          <div class="notif-wrap">
            <button class="notif-btn" onclick="App.toggleNotif()">
              🔔<span id="notif-count" class="notif-count hidden">0</span>
            </button>
            <div id="notif-panel" class="notif-panel hidden">
              <div class="notif-panel-header">
                <span>Notifications</span>
                <button onclick="App.markAllRead()" class="mark-read-btn">Mark all read</button>
              </div>
              <div id="notif-list" class="notif-list"></div>
            </div>
          </div>
        </div>
      </header>
      <div id="page-content" class="page-content"></div>
    </main>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this)App.closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title" class="modal-title">Dialog</h3>
      <button onclick="App.closeModal()" class="modal-close">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-footer" class="modal-footer hidden"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<!-- Scripts (ORDER MATTERS) -->
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/pages/register.js"></script>
<script src="js/pages/owner.js"></script>
<script src="js/pages/worker.js"></script>
<script src="js/pages/teacher.js"></script>
<script src="js/pages/cardmarker.js"></script>
<script src="js/pages/student.js"></script>
<script src="js/app.js"></script>
</body>
</html>
